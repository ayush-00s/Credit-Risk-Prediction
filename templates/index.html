<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credit Risk Prediction</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="container">
    <h1>Credit Risk Prediction</h1>
    <p>
      Enter a borrower's credit profile to estimate the probability of
      serious delinquency within the next 2 years.
    </p>

    <form method="POST" action="/">
      <div class="form-group">
        <label for="RevolvingUtilizationOfUnsecuredLines">Revolving Utilization of Unsecured Lines</label>
        <input type="number" step="any" name="RevolvingUtilizationOfUnsecuredLines" id="RevolvingUtilizationOfUnsecuredLines" required>
      </div>

      <div class="form-group">
        <label for="age">Age</label>
        <input type="number" name="age" id="age" required>
      </div>

      <div class="form-group">
        <label for="NumberOfTime30_59DaysPastDueNotWorse">Times 30-59 Days Past Due</label>
        <input type="number" name="NumberOfTime30_59DaysPastDueNotWorse" id="NumberOfTime30_59DaysPastDueNotWorse" required>
      </div>

      <div class="form-group">
        <label for="DebtRatio">Debt Ratio</label>
        <input type="number" step="any" name="DebtRatio" id="DebtRatio" required>
      </div>

      <div class="form-group">
        <label for="MonthlyIncome">Monthly Income</label>
        <input type="number" step="any" name="MonthlyIncome" id="MonthlyIncome" required>
      </div>

      <div class="form-group">
        <label for="NumberOfOpenCreditLinesAndLoans">Number of Open Credit Lines and Loans</label>
        <input type="number" name="NumberOfOpenCreditLinesAndLoans" id="NumberOfOpenCreditLinesAndLoans" required>
      </div>

      <div class="form-group">
        <label for="NumberOfTimes90DaysLate">Times 90 Days Late</label>
        <input type="number" name="NumberOfTimes90DaysLate" id="NumberOfTimes90DaysLate" required>
      </div>

      <div class="form-group">
        <label for="NumberRealEstateLoansOrLines">Number of Real Estate Loans or Lines</label>
        <input type="number" name="NumberRealEstateLoansOrLines" id="NumberRealEstateLoansOrLines" required>
      </div>

      <div class="form-group">
        <label for="NumberOfTime60_89DaysPastDueNotWorse">Times 60-89 Days Past Due</label>
        <input type="number" name="NumberOfTime60_89DaysPastDueNotWorse" id="NumberOfTime60_89DaysPastDueNotWorse" required>
      </div>

      <div class="form-group">
        <label for="NumberOfDependents">Number of Dependents</label>
        <input type="number" step="any" name="NumberOfDependents" id="NumberOfDependents" required>
      </div>

      <button type="submit" class="btn">Predict</button>
    </form>

    {% if results %}
    <div class="result-box">
      <h2>{{ results }}</h2>
      <p>Estimated default probability: <strong>{{ probability }}%</strong></p>
    </div>
    {% endif %}

  </div>

</body>
</html>
